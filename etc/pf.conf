#set loginterface lo0
set debug none
set ruleset-optimization none
set optimization normal
set block-policy drop

scrub all

sports="{ 49152:65535 }"

table <private> const { 10/8, 172.16/12, 192.168/16 }
table <bogons> const { 0/8, 169/8, 198/8, 203/8, 224/8, 225/8, 226/8, 227/8, 228/8, 229/8, 230/8, 231/8, 232/8, 233/8, 234/8, 235/8, 236/8, 237/8, 238/8, 239/8, 240/8, 241/8, 242/8, 243/8, 244/8, 245/8, 246/8, 247/8, 248/8, 249/8, 250/8, 251/8, 252/8, 253/8, 254/8, 255/8 }
table <dns> const { 86.54.11.100, 86.54.11.200 }
table <porthttps> const { 18.7.29.125, 91.210.59.156, 131.188.12.211, 167.82.50.132, 136.243.18.213, 151.101.2.132, 151.101.194.132, 151.101.66.132, 151.101.130.132, 185.199.108.133, 185.199.109.133, 185.199.110.133, 185.199.111.133 }
table <portrsync> const { 131.188.12.211 }
table <unuseddohdot> const { 1.1.1.1, 1.0.0.1, 8.8.8.8, 8.8.4.4, 9.9.9.9, 149.112.112.112, 94.140.14.14, 94.140.15.15, 86.54.11.100, 86.54.11.200, 86.54.11.1, 86.54.11.201, 86.54.11.13, 86.54.11.213, 194.242.2.2, 194.242.2.3, 80.67.169.12, 80.67.169.40, 185.228.168.168, 185.228.169.168, 185.228.168.10, 185.228.169.11, 208.67.222.222, 208.67.220.220, 208.67.222.123, 208.67.220.123, 208.67.222.2, 208.67.220.2 }

block all
block quick inet6
block in  quick on lo0 inet from !127.0.0.1
block out quick on lo0 inet to !127.0.0.1
block quick on !lo0 inet from 127/8
block quick on !lo0 inet to 127/8
block out quick to { <bogons> }
block in  quick from { <bogons> }

######## RULES

#### NO STATE
## DHCP user root (?replace !<private> by { 0.0.0.0, 169.254/16, 255.255.255.255 })
#pass out quick on $extif inet proto udp from { 0.0.0.0, 169.254/16 } port 68 to <private> port 67 user 0 no state # @DHCP_OUT
#pass in  quick on $extif inet proto udp from <private> port 67 to !<private> port 68 no state # @DHCP_IN
#### BLOCK QUICK NO STATE 1
block out quick to { <private> }
## ICMP
#pass out quick on $extif inet proto icmp from ($extif) icmp-type echoreq no state # @ICMP_OUT
#pass in  quick on $extif inet proto icmp to ($extif) icmp-type echorep no state # @ICMP_IN
## DNS 53 user _mdnsresponder
#pass out quick on $extif inet proto udp from ($extif) port $sports to <dns> port 53 user _mdnsresponder no state # @DNS_DNS_OUT
#pass in  quick on $extif inet proto udp from <dns> port 53 to ($extif) port $sports no state # @DNS_DNS_IN
#### BLOCK QUICK NO STATE 2
block out quick to { <dns> }
block in  quick from { <dns> }
block in  quick from { <private> } # end of no state
#### END OF NO STATE

#### KEEP STATE
######## KEEP STATE ICMP UDP (Not preferred)
######## ICMP
########pass out quick on $extif inet proto icmp from ($extif) icmp-type echoreq keep state # @KEEPSTATE_ICMP
######## DNS 53 user _mdnsresponder
########pass out quick on $extif inet proto udp from ($extif) port $sports to <dns> port 53 user _mdnsresponder keep state # @KEEPSTATE_DNS_DNS
## TCP FLAGS (add proto tcp to "block quick flags" if you put ICMP UDP keep state under "block quick flags")
block quick flags /FSRPAUEW
block quick flags FSRPAUEW/FSRPAUEW
block quick flags U/U
block quick flags E/E
block quick flags W/W
block quick flags F/F
block quick flags SF/SF
block quick flags SR/SR
block quick flags FUP/FUP
#### KEEP STATE TCP
## DNS 443 (DoH) user _mdnsresponder (via mobileconfig) here using censurfridns.dk||uncensoreddns.org
#pass out quick on $extif inet proto tcp from ($extif) port $sports to 89.233.43.71 port 443 user _mdnsresponder flags S/FSRPAUEW keep state # @DNS_DOH
## DNS 853 (DoT) user _mdnsresponder (via mobileconfig) here using censurfridns.dk||uncensoreddns.org
#pass out quick on $extif inet proto tcp from ($extif) port $sports to 89.233.43.71 port 853 user _mdnsresponder flags S/FSRPAUEW keep state # @DNS_DOT
#### BLOCK QUICK KEEP STATE 1
block out quick to { <unuseddohdot> }
block in  quick from { <unuseddohdot> }
## HTTPS MAIL user 501 # HTTPS: S/FSRPAUEW SA/FSRPAUEW A/FSRPAUEW AP/FSRPAUEW F/FSRPAUEW FA/FSRPAUEW R/FSRPAUEW RA/FSRPAUEW
#pass out quick on $extif inet proto tcp from ($extif) port $sports to port { 443 } user 501 flags S/FSRPAUEW keep state # @USER_HTTPS
#pass out quick on $extif inet proto tcp from ($extif) port $sports to port { 993, 587, 465 } user 501 flags S/FSRPAUEW keep state # @USER_MAIL
## PORT user root and user 502(macports)
#pass out quick on $extif inet proto tcp from ($extif) port $sports to { <porthttps> } port { 443 } user 0 flags S/FSRPAUEW keep state # @PORT_ROOT_HTTPS
#pass out quick on $extif inet proto tcp from ($extif) port $sports to { <porthttps> } port { 443 } user 502 flags S/FSRPAUEW keep state # @PORT_USER_HTTPS
#pass out quick on $extif inet proto tcp from ($extif) port $sports to { <portrsync> } port { 873 } user 0 flags S/FSRPAUEW keep state # @PORT_ROOT_RSYNC
#pass out quick on $extif inet proto tcp from ($extif) port $sports to { <portrsync> } port { 873 } user 502 flags S/FSRPAUEW keep state # @PORT_USER_RSYNC
#### END OF KEEP STATE

######## END OF RULES
block quick all # IMPORTANT: no more rules !




